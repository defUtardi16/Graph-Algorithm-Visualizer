<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadStrix</title>
    <link rel="stylesheet" href="splash.css">
</head>
<body>

    <!-- Background Particles -->
    <div class="particles" id="particles"></div>

    <!-- Sound Effect (optional) -->
    <audio id="splash-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Splash -->
    <div class="splash-overlay" id="splashOverlay">

        <!-- Top line decoration -->
        <div class="top-line"></div>

        <!-- Center content -->
        <div class="splash-center">
            <div class="made-by-text">MADE BY</div>
            <div class="brand-wrapper">
                <div class="brand-name" id="brandName">
                    <span class="letter" style="--i:0">R</span>
                    <span class="letter" style="--i:1">A</span>
                    <span class="letter" style="--i:2">D</span>
                    <span class="letter" style="--i:3">S</span>
                    <span class="letter" style="--i:4">T</span>
                    <span class="letter" style="--i:5">R</span>
                    <span class="letter" style="--i:6">I</span>
                    <span class="letter" style="--i:7">X</span>
                </div>
                <div class="brand-glow"></div>
            </div>
            <div class="tagline">— PRODUCTION —</div>
        </div>

        <!-- Loading bar bottom -->
        <div class="loading-section">
            <div class="loading-track">
                <div class="loading-fill" id="loadingFill"></div>
            </div>
            <div class="loading-text" id="loadingText">Loading...</div>
        </div>

        <!-- Bottom line decoration -->
        <div class="bottom-line"></div>

    </div>

    <!-- Fade to white/black transition -->
    <div class="transition-screen" id="transitionScreen"></div>

    <script src="splash.js"></script>

</body>
</html>
